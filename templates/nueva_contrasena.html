<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberMeow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <style>
    /* Indicador de fortaleza de contraseña */
    .strength-bar {
      height: 4px;
      border-radius: 4px;
      margin-top: 6px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      transition: width .3s, background .3s;
    }
    .strength-label {
      font-size: .62rem;
      margin-top: 4px;
      letter-spacing: .06em;
      min-height: 14px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="auth-bg"><canvas id="bgCanvas"></canvas></div>

  <main class="auth-container">
    <section class="auth-card auth-card--register">

      <div class="avatar-container">
        <div class="michi-avatar michi-avatar--pink">🔒</div>
      </div>

      <div class="auth-logo">
        <span class="logo-gem logo-gem--pink">◈</span>
        <span class="logo-name">Nuestro Espacio</span>
      </div>

      <h2 class="auth-title auth-title--pink">Nueva contraseña</h2>
      <p class="auth-sub">Elige una contraseña segura para tu cuenta.</p>

      <div id="errorMsg"   class="auth-error   hidden"></div>
      <div id="successMsg" class="auth-success hidden"></div>

      <div class="field-group">
        <label class="field-label field-label--pink" for="password">Nueva contraseña</label>
        <input type="password" id="password" class="field-input field-input--pink"
               placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <p class="strength-label" id="strengthLabel"></p>
      </div>

      <div class="field-group">
        <label class="field-label field-label--pink" for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" class="field-input field-input--pink"
               placeholder="Repite la contraseña" autocomplete="new-password"/>
      </div>

      <button class="auth-btn auth-btn--cyan" id="saveBtn">
        <span id="btnText">Guardar contraseña</span>
        <span id="btnLoader" class="hidden">Guardando...</span>
      </button>

    </section>
  </main>

  <script src="{{ url_for('static', filename='js/auth-bg.js') }}"></script>
  <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
  <script>
    const TOKEN = "{{ token }}";

    // Indicador de fortaleza
    document.getElementById('password').addEventListener('input', () => {
      const val  = document.getElementById('password').value;
      const fill = document.getElementById('strengthFill');
      const lbl  = document.getElementById('strengthLabel');

      let score = 0;
      if (val.length >= 6)  score++;
      if (val.length >= 10) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const niveles = [
        { w: '0%',   color: 'transparent', texto: '' },
        { w: '25%',  color: '#ff4466',     texto: 'Muy débil' },
        { w: '50%',  color: '#ffaa00',     texto: 'Débil' },
        { w: '75%',  color: '#00f3ff',     texto: 'Buena' },
        { w: '90%',  color: '#00f076',     texto: 'Fuerte' },
        { w: '100%', color: '#00f076',     texto: 'Muy fuerte' },
      ];

      const n = niveles[score] || niveles[0];
      fill.style.width      = n.w;
      fill.style.background = n.color;
      lbl.textContent       = n.texto;
      lbl.style.color       = n.color;
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const password  = document.getElementById('password').value;
      const confirmar = document.getElementById('confirmar').value;

      if (!password || !confirmar) {
        showError('Completa ambos campos');
        return;
      }
      if (password.length < 6) {
        showError('La contraseña debe tener al menos 6 caracteres');
        return;
      }
      if (password !== confirmar) {
        showError('Las contraseñas no coinciden');
        return;
      }

      const result = await authAction(
        '/auth/nueva-contrasena',
        { token: TOKEN, password, confirmar },
        false
      );

      if (result && result.success) {
        showSuccess('¡Contraseña actualizada! Redirigiendo al login...');
        document.getElementById('saveBtn').disabled = true;
        setTimeout(() => window.location.href = '/auth/login', 2000);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('saveBtn').click();
    });
  </script>
</body>
</html>
