<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Correo verificado</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #ffffff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .icono  { font-size: 2rem; }
    .titulo { font-size: 1.3rem; font-weight: 600; letter-spacing: 0.05em; }
    .sub    { font-size: 0.85rem; color: #666; }
  </style>
</head>
<body>
  {% if exito %}
    <div class="icono">✓</div>
    <div class="titulo">Correo verificado</div>
    <div class="sub">Puedes cerrar esta pestaña</div>
  {% else %}
    <div class="icono">✗</div>
    <div class="titulo">{{ mensaje }}</div>
  {% endif %}
</body>
</html>
